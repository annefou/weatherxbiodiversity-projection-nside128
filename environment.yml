# Single source of truth for the runtime — used by local dev, Docker, and CI.
# This is the Option C HEALPix nside=128 sibling of
# `annefou/weatherxbiodiversity-projection` (which runs the same pipeline at
# nside=64). Tier 1 + Tier 2 (DestinE Climate DT projection) are both in scope.
name: "weatherxbiodiversity-projection-nside128"
channels:
  - conda-forge
dependencies:
  - python=3.12
  # --- upstream-required scientific stack ---
  - numpy
  - pandas>=2.0
  - xarray>=2024.6
  - scipy
  - matplotlib
  - statsmodels              # variational-Bayes GLMM (BinomialBayesMixedGLM)
  # --- Bayesian MCMC (full posterior covariance for the substrate-robustness verdict) ---
  # arviz<0.22 because pymc 5.28 still does `from arviz import concat`,
  # which was removed in arviz 0.22+ (1.x is the modular split). Pin
  # arviz first; bambi/pymc/pytensor follow conda-forge's compatible
  # selections.
  - arviz<0.22
  - bambi                    # high-level GLMM fit on top of pymc
  - pymc                     # MCMC backend (NUTS via pytensor)
  - pyarrow                  # parquet I/O for dataGLMM intermediate
  - pyproj                   # WGS84 / CRS helpers
  - netcdf4                  # CRU TS NetCDF reading
  - requests                 # GBIF + figshare HTTP downloads
  # --- notebook execution + Jupyter Book build (CI uses these) ---
  - jupytext
  - jupyterlab
  - nbclient
  - ipykernel
  # --- HEALPix substrate (geo-aware, NOT cosmology-first) ---
  # healpix-geo (NOT healpy) for the WGS84-aware HEALPix conversion
  # used everywhere in healpix_port/. healpy is non-geo-aware
  # (cosmology-first; lon convention 0-360, no CRS handling) and
  # accumulates small biases over decadal time series, which is
  # unacceptable for biodiversity-precision climate-impact work over
  # Iberia (DOMAIN.md). Per DOMAIN.md HEALPix is always NESTED, always
  # WGS84.
  - healpix-geo
  # --- map plotting (Iberia coverage + figures) ---
  - cartopy                  # Iberia coastline maps (conda preferred — C/PROJ extension)
  # --- Tier 2 only (DestinE Climate DT projection) ---
  # Required by 05_destine_download.py / 06_destine_clean.py /
  # 07_projection.py / 08_projection_figures.py. 05 is guarded by
  # `_tier2_guard.py` and skips cleanly when DestinE credentials are
  # absent; 06/07/08 only need the GRIBs to be on disk. Installing on
  # a non-DestinE host is safe but unused (until GRIBs land).
  - eccodes                  # ECMWF GRIB C library (with Python bindings)
  - python-eccodes           # explicit Python binding (sometimes split out)
  - pip
  - pip:
    # snakemake on conda-forge fails to solve under setup-micromamba@v3 —
    # install via pip. See docs/cicd-conventions.md.
    - snakemake
    # earthkit-data + polytope-client are pip-only on the DestinE
    # Jupyter image (conda-forge solver can't satisfy them in the
    # destine_climate_dt platform image as of 2026-05). Install via pip
    # to keep the env reproducible on both DestinE and a local Mac.
    - earthkit-data
    - polytope-client
    # healpix-plot is the EOPF-DGGS canonical HEALPix+cartopy plotting
    # library (per DOMAIN.md: "replaces ad-hoc ang2pix + pcolormesh
    # bridges"). Resamples HEALPix to a regular grid via
    # nearest/bilinear and renders cleanly in any cartopy projection;
    # avoids the polygon-overlap artefacts of manual PolyCollection.
    # PyPI-only as of 2026-05; small dep (~1 MB).
    - healpix-plot
