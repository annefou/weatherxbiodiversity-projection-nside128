name: Build and Deploy Jupyter Book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.guard.outputs.skip }}
      pages_enabled: ${{ steps.pages_check.outputs.pages_enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip if template has not been initialised
        id: guard
        run: |
          # Look for any unresolved {{...}} placeholder OTHER than
          # {{ZENODO_DOI}}, which is intentionally filled in only after the
          # first GitHub release mints a Zenodo concept DOI.
          UNRESOLVED=$(grep -rhoE '\{\{[A-Z_]+\}\}' . \
            --include='*.md' --include='*.yml' --include='*.yaml' \
            --include='*.json' --include='*.cff' --include='*.py' 2>/dev/null \
            | grep -v '^{{ZENODO_DOI}}$' \
            | sort -u \
            | head -1)
          if [ -n "$UNRESOLVED" ]; then
            echo "::notice::Template placeholder ${UNRESOLVED} still present. Run /init-template inside Claude Code (or substitute manually) before the Jupyter Book builds meaningfully. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether GitHub Pages is enabled
        id: pages_check
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" 2>/dev/null | head -1 > /dev/null; then
            echo "::notice::GitHub Pages is enabled — Jupyter Book will deploy."
            echo "pages_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::GitHub Pages is not yet enabled on this repo. Build will run; deploy will be skipped. Enable Pages at https://github.com/${{ github.repository }}/settings/pages (Source: GitHub Actions) to enable deploy on the next push."
            echo "pages_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Micromamba
        if: steps.guard.outputs.skip != 'true'
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: ${{ github.event.repository.name }}
          init-shell: bash
          cache-environment: true

      - name: Convert .py notebooks to .ipynb
        if: steps.guard.outputs.skip != 'true'
        shell: micromamba-shell {0}
        run: |
          for nb in notebooks/*.py; do
            jupytext --to notebook "$nb"
          done

      # We deliberately skip jupyter execute on CI. Notebooks in this repo
      # depend on data that is not available on a generic GitHub Actions
      # runner (Tier-2 DestinE Climate DT credentials; substrate-sensitivity
      # inputs from sibling repos / Zenodo). Partial executions produce
      # broken inline outputs (empty subplots, half-filled figures) AND
      # overwrite the committed figures/*.png in the workspace, which then
      # get rendered by MyST instead of the committed canonical versions.
      #
      # Instead: each chapter embeds its committed figures as markdown
      # image refs (../figures/...) so MyST renders the canonical PNGs
      # directly from the repo. Source-code cells render as code, markdown
      # cells render normally, and there are no broken cell outputs.
      #
      # To re-enable execution per-notebook, commit a pre-executed .ipynb
      # alongside the .py — jupytext --to notebook will pick up the
      # existing .ipynb if present.

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 22.x

      - name: Install MyST
        if: steps.guard.outputs.skip != 'true'
        run: npm install -g mystmd

      - name: Build MyST site
        if: steps.guard.outputs.skip != 'true'
        env:
          # MyST silently ignores `base_url` in myst.yml — only this env var
          # works. See docs/cicd-conventions.md.
          BASE_URL: /${{ github.event.repository.name }}
        run: myst build --html

      - name: Upload pages artifact
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _build/html

  deploy:
    needs: build
    if: needs.build.outputs.skip != 'true' && needs.build.outputs.pages_enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
